<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring</title>
    <style>
        /* Menghilangkan margin bawaan browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scroll ganda */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container utama agar iframe memenuhi layar */
        .embed-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Styling Iframe */
        iframe {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Opsional: Loading spinner sederhana */
        .loader {
            position: fixed;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
        }
    </style>
</head>
<body>

    <div class="loader">Memuat halaman...</div>

    <div class="embed-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzwK8xUB_nbTvv5khgAjp4EeYzXp3BoeQkFEtTKiWtdR_508QtMihN5SxUFuYyBSfajag/exec" 
            allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb"
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
